<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CT HRG Team - Cronograma de Treinos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Vermelho de alta intensidade e tons escuros baseados na logo do rinoceronte */
            --hrg-red: #D11919; 
            --hrg-dark: #111317;
            --hrg-slate: #374151;
            --hrg-light: #f8fafc;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f1f5f9;
        }
        .text-hrg { color: var(--hrg-red); }
        .bg-hrg { background-color: var(--hrg-red); }
        .border-hrg { border-color: var(--hrg-red); }
        .bg-hrg-dark { background-color: var(--hrg-dark); }
        
        /* Efeito hover suave nos cartões de treinos */
        .class-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .class-card:hover {
            box-shadow: 0 12px 20px -8px rgba(209, 25, 25, 0.25);
            transform: translateY(-3px);
            border-color: var(--hrg-red);
        }
        .search-focus:focus {
            ring: 2px;
            ring-color: var(--hrg-red);
            outline: none;
            border-color: var(--hrg-red);
        }
        .lang-btn.active {
            background-color: var(--hrg-red);
            color: white;
            border-color: var(--hrg-red);
        }
    </style>
</head>
<body class="text-slate-900 min-h-screen">

    <div class="bg-zinc-950 py-2 border-b border-zinc-800">
        <div class="container mx-auto px-4 flex justify-between items-center text-xs">
            <span class="text-zinc-400 font-medium tracking-wide uppercase hidden sm:inline">CT HRG TEAM • Centro de Treinamento</span>
            <div class="flex gap-2 ml-auto">
                <button onclick="changeLang('pt')" id="btn-pt" class="lang-btn px-3 py-1 rounded-md text-xs font-bold border border-zinc-700 text-zinc-300 hover:border-red-600 transition-all active">PT</button>
                <button onclick="changeLang('es')" id="btn-es" class="lang-btn px-3 py-1 rounded-md text-xs font-bold border border-zinc-700 text-zinc-300 hover:border-red-600 transition-all">ES</button>
                <button onclick="changeLang('en')" id="btn-en" class="lang-btn px-3 py-1 rounded-md text-xs font-bold border border-zinc-700 text-zinc-300 hover:border-red-600 transition-all">EN</button>
            </div>
        </div>
    </div>

    <nav class="bg-white border-b border-slate-200 py-5 sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <!-- Verbatim image path para a logo da HRG Team -->
                <img src="logo.png" alt="Logo CT HRG Team" class="h-20 w-20 object-cover rounded-full border-2 border-red-600 shadow-md">
                <div>
                    <h1 class="text-3xl font-extrabold text-zinc-950 tracking-tight flex items-center gap-2">
                        HRG <span class="text-red-600">TEAM</span>
                    </h1>
                    <p id="sub-header" class="text-slate-500 text-xs font-extrabold tracking-wider uppercase">Centro de Treinamento</p>
                </div>
            </div>
            
            <!-- Barra de Busca Avançada -->
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </span>
                <input type="text" id="searchInput" placeholder="Filtrar por modalidade ou horário..." 
                    class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-300 rounded-full search-focus text-sm transition-all shadow-inner">
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        
        <!-- Legendas / Categorias de Treino -->
        <div id="legends" class="flex flex-wrap gap-3 mb-8 justify-center">
            <!-- Gerado dinamicamente via JS -->
        </div>

        <!-- Grade Semanal de Aulas (Segunda a Sexta por padrão) -->
        <div id="calendarGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-6">
            <!-- Os dias da semana e treinos aparecerão aqui -->
        </div>

        <!-- Estado de Busca Sem Resultados -->
        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-3xl border border-slate-200 shadow-sm max-w-lg mx-auto mt-10">
            <svg class="mx-auto h-16 w-16 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 9.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <h3 id="empty-title" class="mt-4 text-lg font-bold text-slate-900">Nenhum treino encontrado</h3>
            <p id="empty-desc" class="mt-1 text-sm text-slate-500">Tente buscar por um termo diferente, ex: "Luta Livre" ou "09:00".</p>
        </div>
    </main>

    <footer class="bg-zinc-950 border-t border-zinc-800 text-zinc-400 mt-20 py-12">
        <div class="container mx-auto px-4 text-center">
            <img src="logo.png" alt="CT HRG Team" class="h-14 w-14 object-cover rounded-full border border-red-600 mx-auto mb-4 opacity-80">
            <p class="font-bold text-white text-lg tracking-tight mb-1">CT HRG TEAM</p>
            <p class="text-xs text-zinc-500 uppercase tracking-widest mb-4">Centro de Treinamento</p>
            <div class="border-t border-zinc-800 pt-6 max-w-xs mx-auto text-xs text-zinc-500">
                &copy; 2026 CT HRG Team. Todos os direitos reservados.
            </div>
        </div>
    </footer>

    <script>
        let currentLang = 'pt';

        // Estrutura de internacionalização (PT, ES, EN)
        const i18n = {
            pt: {
                days: ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"],
                modalities: {
                    luta: "Luta Livre Esportiva",
                    funcional: "Treino Funcional",
                    thai: "Muay Thai",
                    boxethai: "Boxe & Muay Thai"
                },
                ui: {
                    search: "Filtrar por esporte ou horário...",
                    emptyTitle: "Nenhum treino encontrado",
                    emptyDesc: "Tente buscar por outro termo, ex: 'Luta Livre' ou '09h'.",
                    legends: {
                        luta: "Luta Livre",
                        funcional: "Funcional",
                        thai: "Muay Thai",
                        boxethai: "Boxe & Thai"
                    }
                }
            },
            es: {
                days: ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes"],
                modalities: {
                    luta: "Luta Livre Deportiva",
                    funcional: "Entrenamiento Funcional",
                    thai: "Muay Thai",
                    boxethai: "Boxeo & Muay Thai"
                },
                ui: {
                    search: "Filtrar por deporte u horario...",
                    emptyTitle: "No se encontraron entrenamientos",
                    emptyDesc: "Intente buscar otro término, ej: 'Luta Livre' o '09h'.",
                    legends: {
                        luta: "Luta Livre",
                        funcional: "Funcional",
                        thai: "Muay Thai",
                        boxethai: "Boxeo & Thai"
                    }
                }
            },
            en: {
                days: ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
                modalities: {
                    luta: "Submission Luta Livre",
                    funcional: "Functional Training",
                    thai: "Muay Thai",
                    boxethai: "Boxing & Muay Thai"
                },
                ui: {
                    search: "Filter by sport or class time...",
                    emptyTitle: "No training sessions found",
                    emptyDesc: "Try searching for another term, e.g., 'Grappling' or '9am'.",
                    legends: {
                        luta: "Luta Livre",
                        funcional: "Functional",
                        thai: "Muay Thai",
                        boxethai: "Boxing & Thai"
                    }
                }
            }
        };

        // Banco de dados mapeando as atividades semanais do CT HRG Team (Seg=0, Ter=1, Qua=2, Qui=3, Sex=4)
        const treinos = [
            /* Luta Livre Esportiva: Segunda a Sexta 09h-10h e 19h-20h */
            { cat: "luta", dias: [0, 1, 2, 3, 4], horas: "09:00 - 10:00", tags: "luta livre esportiva submission grappling" },
            { cat: "luta", dias: [0, 1, 2, 3, 4], horas: "19:00 - 20:00", tags: "luta livre esportiva submission grappling" },
            /* Luta Livre Esportiva: Terça e Quinta 08h-09h */
            { cat: "luta", dias: [1, 3], horas: "08:00 - 09:00", tags: "luta livre esportiva submission grappling" },

            /* Treino Funcional: Segunda e Sexta 06h-07h */
            { cat: "funcional", dias: [0, 4], horas: "06:00 - 07:00", tags: "treino funcional preparacao fisica" },
            /* Treino Funcional: Segunda a Sexta 09h-10h */
            { cat: "funcional", dias: [0, 1, 2, 3, 4], horas: "09:00 - 10:00", tags: "treino funcional preparacao fisica" },

            /* Muay Thai: Segunda a Sexta 08h-09h e 20h-21h */
            { cat: "thai", dias: [0, 1, 2, 3, 4], horas: "08:00 - 09:00", tags: "muay thai tailandesa kickboxing" },
            { cat: "thai", dias: [0, 1, 2, 3, 4], horas: "20:00 - 21:00", tags: "muay thai tailandesa kickboxing" },

            /* Boxe & Muay Thai: Segunda a Sexta 10h-11h */
            { cat: "boxethai", dias: [0, 1, 2, 3, 4], horas: "10:00 - 11:00", tags: "boxe muay thai pugilismo kickboxing" }
        ];

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${lang}`).classList.add('active');
            
            // Traduzindo elementos de entrada e alertas de pesquisa
            document.getElementById('searchInput').placeholder = i18n[lang].ui.search;
            document.getElementById('empty-title').innerText = i18n[lang].ui.emptyTitle;
            document.getElementById('empty-desc').innerText = i18n[lang].ui.emptyDesc;
            
            renderLegends();
            renderCalendar();
        }

        function renderLegends() {
            const container = document.getElementById('legends');
            const translation = i18n[currentLang].ui.legends;
            
            container.innerHTML = `
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-sm border border-slate-200 text-xs font-bold">
                    <span class="w-3 h-3 bg-red-600 rounded-full"></span> ${translation.luta}
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-sm border border-slate-200 text-xs font-bold">
                    <span class="w-3 h-3 bg-zinc-950 rounded-full"></span> ${translation.funcional}
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-sm border border-slate-200 text-xs font-bold">
                    <span class="w-3 h-3 bg-amber-500 rounded-full"></span> ${translation.thai}
                </div>
                <div class="flex items-center gap-2 px-4 py-2 bg-white rounded-full shadow-sm border border-slate-200 text-xs font-bold">
                    <span class="w-3 h-3 bg-blue-600 rounded-full"></span> ${translation.boxethai}
                </div>
            `;
        }

        function renderCalendar() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('calendarGrid');
            const emptyState = document.getElementById('emptyState');
            grid.innerHTML = '';
            
            let totalFound = 0;
            const days = i18n[currentLang].days;

            days.forEach((dayName, index) => {
                // Filtra as aulas do dia atual que correspondem à busca
                const treinosDoDia = treinos.filter(treino => {
                    const matchDia = treino.dias.includes(index);
                    const modalityText = i18n[currentLang].modalities[treino.cat].toLowerCase();
                    const matchSearch = modalityText.includes(searchTerm) || 
                                        treino.horas.includes(searchTerm) ||
                                        treino.tags.toLowerCase().includes(searchTerm);
                    return matchDia && matchSearch;
                });

                if (treinosDoDia.length > 0) {
                    totalFound++;
                    
                    // Ordenando cronologicamente os treinos por horário de início
                    treinosDoDia.sort((a, b) => a.horas.localeCompare(b.horas));

                    const section = document.createElement('div');
                    section.className = 'bg-white rounded-3xl p-5 shadow-sm border border-slate-200 flex flex-col';
                    section.innerHTML = `
                        <h2 class="text-xl font-extrabold text-zinc-950 mb-4 border-b border-slate-100 pb-3 flex justify-between items-center">
                            <span>${dayName}${currentLang === 'pt' ? '-feira' : ''}</span>
                            <span class="text-xs px-2 py-0.5 bg-red-50 text-red-600 rounded-md font-semibold">${treinosDoDia.length} Aulas</span>
                        </h2>
                    `;

                    treinosDoDia.forEach(treino => {
                        let borderStyle = "border-l-4 border-red-600 bg-red-50/20"; // Luta Livre
                        if (treino.cat === "funcional") borderStyle = "border-l-4 border-zinc-950 bg-zinc-50"; 
                        if (treino.cat === "thai") borderStyle = "border-l-4 border-amber-500 bg-amber-50/20";
                        if (treino.cat === "boxethai") borderStyle = "border-l-4 border-blue-600 bg-blue-50/20";
                        
                        const card = document.createElement('div');
                        card.className = `class-card mb-3 p-3 rounded-2xl border ${borderStyle} flex flex-col gap-1 cursor-default`;
                        card.innerHTML = `
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] uppercase font-extrabold tracking-wider text-slate-400">
                                    ${i18n[currentLang].modalities[treino.cat]}
                                </span>
                                <span class="text-xs font-extrabold text-red-600 tracking-tight bg-white px-2 py-0.5 rounded-full shadow-sm">
                                    ${treino.horas}
                                </span>
                            </div>
                            <h3 class="font-extrabold text-zinc-900 text-sm tracking-tight mt-1">
                                ${i18n[currentLang].modalities[treino.cat]}
                            </h3>
                            <div class="flex items-center gap-1 text-[11px] text-slate-500 mt-1">
                                <span class="opacity-80">📍</span> CT HRG Team
                            </div>
                        `;
                        section.appendChild(card);
                    });
                    grid.appendChild(section);
                }
            });

            // Gerenciador de Estado Vazio
            if (totalFound === 0) {
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
            } else {
                emptyState.classList.add('hidden');
                grid.classList.remove('hidden');
            }
        }

        document.getElementById('searchInput').addEventListener('input', renderCalendar);
        
        // Ativando página no carregamento padrão em Português
        window.onload = () => changeLang('pt');
    </script>
</body>
</html>
